name: paamalai
description: Bible app for English and Tamil readers — yearly plan, daily devotion, and audio reader.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State + nav
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Local DB (read-only Bible + writable progress mirror)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Backend
  supabase_flutter: ^2.5.6

  # Content
  flutter_markdown: ^0.7.3
  intl: ^0.19.0

  # TTS + utilities
  flutter_tts: ^4.0.2
  app_settings: ^5.1.1
  shared_preferences: ^2.2.3
  scrollable_positioned_list: ^0.3.8
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/bible/web.sqlite
    - assets/bible/ta_uv.sqlite

  fonts:
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
